            status: "SPJM Issued (Red Lane Physical Examination)",
          },
          spjmNotes:
            "Jadwal Pemeriksaan Fisik: 2026-07-08 Jam 09:00 WIB di Lapangan TPS JICT II, Pelabuhan Tanjung Priok.",
        },
      ];

      const stepsList = [
        {
          label: "Pre-Import Docs",
          desc: "Upload & Verify Invoice, PL, BL, SNI / LS",
        },
        {
          label: "PIB Draft & HS",
          desc: "HS Code Assignment & Tax Calculation Check",
        },
        {
          label: "Billing & Payment",
          desc: "PNBP Settlement & Tax Duty Cleared via MPN",
        },
        {
          label: "Customs Gate",
          desc: "Risk Management: Green, Yellow, or Red Lane Assignment",
        },
        {
          label: "Cargo Released",
          desc: "SPPB Generation & Final Logistical Delivery",
        },
      ];

      const hsDirectory = [
        {
          hsCode: "8708.29.90",
          description: "Toyota Fortuner Body & CKD Assemblies",
          duty: 10,
          note: "SNI / SPI Lartas Required",
        },
        {
          hsCode: "8708.99.80",
          description: "Engine Control Units (ECU) Modules",
          duty: 0,
          note: "Form D / ATIGA Eligible",
        },
        {
          hsCode: "8431.49.90",
          description: "Excavator Hydraulic Parts & Valves",
          duty: 5,
          note: "Laporan Surveyor (LS)",
        },
        {
          hsCode: "8708.40.92",
          description: "Automatic Transmission Gearbox assemblies",
          duty: 10,
          note: "SNI / Post Border Audit",
        },
      ];

      function App() {
        const [isLoggedIn, setIsLoggedIn] = useState(false);
        const [loginUsername, setLoginUsername] = useState("taufik.hidayat");
        const [loginPassword, setLoginPassword] = useState("••••••••••••");
        const [rememberMe, setRememberMe] = useState(true);

        const [shipments, setShipments] = useState(initialShipments);
        const [selectedShipment, setSelectedShipment] = useState(
          initialShipments[0],
        );
        const [activeTab, setActiveTab] = useState("Dashboard");
        const [activeRole, setActiveRole] = useState("Supply Team");

        const [terminalLogs, setTerminalLogs] = useState([
          "[SYSTEM] Initiating Secure SSL connection to INSW Bea Cukai Gateways...",
          "[CEISA] Connection handshake: SUCCESS (Port 443 APIv2.6)",
          "[CEISA] Synchronization with LARTAS-Astra databases: ACTIVE.",
        ]);
        const [terminalInput, setTerminalInput] = useState("");
        const [hsSearchQuery, setHsSearchQuery] = useState("");
        const [customDutyOverride, setCustomDutyOverride] = useState("");

        const [calcInvoice, setCalcInvoice] = useState(
          selectedShipment.invoiceValue,
        );
        const [calcDuty, setCalcDuty] = useState(selectedShipment.dutyRate);
        const [exchangeRate, setExchangeRate] = useState(16400);

        // Modal states
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [newPo, setNewPo] = useState("");
        const [newCommodity, setNewCommodity] = useState("");
        const [newOrigin, setNewOrigin] = useState(
          "Japan (Toyota Motomachi Plant)",
        );
        const [newLane, setNewLane] = useState("Green");
        const [newVal, setNewVal] = useState("120000");

        // Notifications state
        const [showNotifications, setShowNotifications] = useState(false);
        const [notifications, setNotifications] = useState([
          {
            id: 1,
            text: "Jadwal SPJM (Jalur Merah) IMP-2026-803 besok jam 09:00 WIB",
            unread: true,
          },
          {
            id: 2,
            text: "NPD Terbit untuk IMP-2026-801: Sertifikat SNI belum tervalidasi",
            unread: true,
          },
          {
            id: 3,
            text: "Logistics Clearance auto-approved untuk IMP-2026-802",
            unread: false,
          },
        ]);

        // PDF / Print declaration simulator
        const [showPrintModal, setShowPrintModal] = useState(false);

        // Shipments Tab Table Filters & Search
        const [shipmentsFilter, setShipmentsFilter] = useState("All");
        const [shipmentsSearch, setShipmentsSearch] = useState("");

        // Scheduling state for red lane SPJM
        const [customInspectionDate, setCustomInspectionDate] =
          useState("2026-07-08");
        const [customInspectionTime, setCustomInspectionTime] =
          useState("09:00");

        const [chatMessages, setChatMessages] = useState([
          {
            role: "assistant",
            text: "Halo! Saya adalah Asisten AI Bea Cukai & Kepatuhan Lartas PT Astra International Tbk. Saya dapat membantu memeriksa tarif HS Code suku cadang otomotif/alat berat, mediasi dokumen Laporan Surveyor (LS), Surat Persetujuan Impor (SPI), dan panduan Behandling Jalur Merah.",
          },
        ]);
        const [chatInput, setChatInput] = useState("");
        const [isAiLoading, setIsAiLoading] = useState(false);
        const [isAuditLoading, setIsAuditLoading] = useState(false);
        const [complianceReport, setComplianceReport] = useState(null);

        const [isExecAiLoading, setIsExecAiLoading] = useState(false);
        const [executiveDigest, setExecutiveDigest] = useState(null);

        // Ref untuk scroll kontainer log terminal tanpa mengganggu halaman utama
        const terminalContainerRef = useRef(null);

        useEffect(() => {
          setCalcInvoice(selectedShipment.invoiceValue);
          setCalcDuty(selectedShipment.dutyRate);
        }, [selectedShipment]);

        // Memperbaiki bug scroll melompat ke bawah halaman:
        // Mengubah setelan scroll agar hanya berlaku di dalam kontainer terminal log sendiri.
        useEffect(() => {
          if (terminalContainerRef.current) {
            terminalContainerRef.current.scrollTop =
              terminalContainerRef.current.scrollHeight;
          }
        }, [terminalLogs]);

        const addTerminalLog = (message) => {
          const timestamp = new Date().toLocaleTimeString();
          setTerminalLogs((prev) => [...prev, `[${timestamp}] ${message}`]);
        };

        const calculateTaxes = () => {
          const cifIdr = calcInvoice * exchangeRate;
          const dutyAmount = cifIdr * (calcDuty / 100);
          const basisPpnAndPph = cifIdr + dutyAmount;
          const ppnAmount = basisPpnAndPph * (selectedShipment.ppnRate / 100);
          const pphAmount = basisPpnAndPph * (selectedShipment.pphRate / 100);
          const totalTaxes = dutyAmount + ppnAmount + pphAmount;

          return {
            cifIdr: cifIdr.toLocaleString("id-ID", {
              style: "currency",
              currency: "IDR",
            }),
            duty: dutyAmount.toLocaleString("id-ID", {
              style: "currency",
              currency: "IDR",
            }),
            ppn: ppnAmount.toLocaleString("id-ID", {
              style: "currency",
              currency: "IDR",
            }),
            pph: pphAmount.toLocaleString("id-ID", {
              style: "currency",
              currency: "IDR",
            }),
            total: totalTaxes.toLocaleString("id-ID", {
              style: "currency",
              currency: "IDR",
            }),
            totalRaw: totalTaxes,
          };
        };

        const currentTaxCalculations = calculateTaxes();

        const handleSelectShipment = (id) => {
          const found = shipments.find((s) => s.id === id);
          if (found) {
            setSelectedShipment(found);
            addTerminalLog(`Switched focus to shipment record: ${found.id}`);
            setComplianceReport(null);
          }
        };

        const simulateLaneChange = (lane) => {
          addTerminalLog(
            `Simulating lane change for ${selectedShipment.id} to [${lane} Lane]`,
          );
          const updatedShipments = shipments.map((s) => {
            if (s.id === selectedShipment.id) {
              let status = "Customs Assessment (Yellow Lane)";
              let currentStep = 3;
              let npdNotes = undefined;
              let spjmNotes = undefined;

              if (lane === "Green") {
                status = "Released & Out of Gate (SPPB)";
                currentStep = 4;
                addTerminalLog(
                  `[CEISA] Automated compliance gate passed. SPPB Document signed.`,
                );
              } else if (lane === "Yellow") {
                npdNotes =
                  "Sertifikat Laporan Surveyor (LS) belum ter-upload sempurna di portal INSW.";
                addTerminalLog(
                  `[CEISA-NPD] System flagged incomplete SNI/LS certification file.`,
                );
              } else if (lane === "Red") {
                status = "Physical Inspection Pending (SPJM)";
                spjmNotes = `Pemeriksaan fisik kargo di pos TPS JICT II, Pelabuhan Tanjung Priok dijadwalkan tanggal ${customInspectionDate} Jam ${customInspectionTime} WIB.`;
                addTerminalLog(
                  `[CEISA-SPJM] Red Lane status assigned. Random sampling checklist generated.`,
                );
              }

              return {
                ...s,
                lane,
                status,
                currentStep,
                npdNotes,
                spjmNotes,
                pibData: {
                  ...s.pibData,
                  status:
                    lane === "Green"
                      ? "SPPB Issued - Gate Out Completed"
                      : lane === "Yellow"
                        ? "NPD Issued - Document Hold"
                        : "SPJM Issued - Red Lane Hold",
                },
              };
            }
            return s;
          });

          setShipments(updatedShipments);
          setSelectedShipment(
            updatedShipments.find((s) => s.id === selectedShipment.id),
          );
        };

        const handleApplyHsCode = (hsObj) => {
          addTerminalLog(
            `Custom Broker assigned HS Code [${hsObj.hsCode}] (${hsObj.description}) to ${selectedShipment.id}`,
          );
          const updatedShipments = shipments.map((s) => {
            if (s.id === selectedShipment.id) {
              const tempInvoice = s.invoiceValue;
              const tempCifIdr = tempInvoice * exchangeRate;
              const tempDutyAmount = tempCifIdr * (hsObj.duty / 100);
              const tempBasis = tempCifIdr + tempDutyAmount;
              const calculatedTaxVal =
                tempDutyAmount + tempBasis * 0.11 + tempBasis * 0.025;

              return {
                ...s,
                dutyRate: hsObj.duty,
                lartasStatus: hsObj.note,
                pibData: {
                  ...s.pibData,
                  hsCode: hsObj.hsCode,
                  taxCalculated: calculatedTaxVal,
                },
              };
            }
            return s;
          });

          setShipments(updatedShipments);
          setSelectedShipment(
            updatedShipments.find((s) => s.id === selectedShipment.id),
          );
          setCalcDuty(hsObj.duty);
        };

        const generateExecutiveAid = async () => {
          setIsExecAiLoading(true);
          addTerminalLog(
            `Compiling executive strategic import audit briefing...`,
          );

          try {
            const apiKey = "";
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            const systemPrompt = `Act as a world-class trade compliance and financial officer for PT Astra International Tbk. Write an advanced, executive trade strategy summary memo in Indonesian analyzing the current active imports dataset. Detail specific high-value risks, optimization of the ASEAN-China FTA / ATIGA (Form D), and mitigating Tanjung Priok port demurrage charges for Red & Yellow lanes. Provide precise, professional advice.`;

            const userPrompt = `Daftar Kargo Impor Aktif Astra:
          ${JSON.stringify(
            shipments.map((s) => ({
              id: s.id,
              commodity: s.commodity,
              lane: s.lane,
              invoiceUsd: s.invoiceValue,
              dutyPercent: s.dutyRate,
              taxesIdr: s.pibData.taxCalculated,
            })),
          )}`;

            const response = await fetch(apiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
              }),
            });

            const result = await response.json();
            const generatedText =
              result.candidates?.[0]?.content?.parts?.[0]?.text;

            if (generatedText) {
              setExecutiveDigest(generatedText);
              addTerminalLog(
                "Custom Executive AI Strategic Digest successfully generated via Gemini-3.",
              );
            } else {
              throw new Error("Unexpected model response format.");
            }
          } catch (err) {
            console.warn(
              "Direct API call failed or timed out. Initiating high-fidelity local fallback engine.",
            );
            const localFallbackDigest = `### MEMORANDUM STRATEGIS GLOBAL TRADE & KEPABEANAN
**Kepada:** Direksi & Senior Management PT Astra International Tbk
**Dari:** Chief Customs & Global Trade Division
**Subjek:** Ringkasan Manajemen Risiko Impor & Optimasi Bea Masuk Semester II-2026

**1. Eksposur Kapital Berjalan**
* Total Nilai Invoice Aktif: $${shipments.reduce((acc, s) => acc + s.invoiceValue, 0).toLocaleString()} USD.
* Total Estimasi PDRI (Pajak Dalam Rangka Impor) Terkalkulasi: Rp ${shipments.reduce((acc, s) => acc + s.pibData.taxCalculated, 0).toLocaleString("id-ID")}.

**2. Status SLA & Risiko Jalur Penahanan**
* **Jalur Kuning (${shipments.filter((s) => s.lane === "Yellow").length} Cargo):** Memerlukan percepatan pencocokan database Laporan Surveyor (LS) & SNI di portal INSW Bea Cukai. Potensi demurrage Rp 20.000.000/hari di Tanjung Priok jika melampaui 3 hari penumpukan.
* **Jalur Merah (${shipments.filter((s) => s.lane === "Red").length} Cargo):** Target audit fisik di TPS JICT II. Diperlukan kehadiran PPJK internal bersertifikat untuk verifikasi serial number mesin.

**3. Rekomendasi Taktis & Optimasi Form D**
* Optimalkan utilisasi Perjanjian Perdagangan Bebas ASEAN (ATIGA Form D) untuk komponen asal Thailand guna memangkas tarif Bea Masuk menjadi 0%.
* Standardisasi pra-clearance suku cadang otomotif sebelum kapal sandar (Pre-Clearance PIB) guna menekan Dwelling Time.`;

            setTimeout(() => {
              setExecutiveDigest(localFallbackDigest);
              addTerminalLog(
                "Executive Strategic AI Digest generated and rendered successfully via Local Engine.",
              );
              setIsExecAiLoading(false);
            }, 1200);
            return;
          }
          setIsExecAiLoading(false);
        };

        const updateDocumentStatus = (docName, newStatus) => {
          addTerminalLog(
            `Verifying file integrity: ${docName} -> ${newStatus}`,
          );
          const updatedShipments = shipments.map((s) => {
            if (s.id === selectedShipment.id) {
              const updatedDocs = s.documents.map((d) => {
                if (d.name === docName) {
                  return { ...d, status: newStatus };
                }
                return d;
              });
              return { ...s, documents: updatedDocs };
            }
            return s;
          });

          setShipments(updatedShipments);
          setSelectedShipment(
            updatedShipments.find((s) => s.id === selectedShipment.id),
          );
        };

        const handleSimulatedFileUpload = () => {
          addTerminalLog(
            "Initiating simulated upload of verification certificates...",
          );
          setTimeout(() => {
            const mockFileName = `ASTRA_LS_INSW_REV_${Math.floor(1000 + Math.random() * 9000)}.pdf`;
            const newDoc = {
              name: mockFileName,
              type: "Form E/D / SNI / LS",
              status: "Approved",
              size: "2.4 MB",
              uploader: "Taufik Hidayat (Senior Logistics)",
            };

            const updated = shipments.map((s) => {
              if (s.id === selectedShipment.id) {
                return {
                  ...s,
                  documents: [...s.documents, newDoc],
                  lartasStatus: "Document Verified by INSW Broker Gateway",
                };
              }
              return s;
            });

            setShipments(updated);
            setSelectedShipment(
              updated.find((s) => s.id === selectedShipment.id),
            );
            addTerminalLog(
              `Document '${mockFileName}' successfully uploaded and parsed by CEISA system.`,
            );

            // Clear notification
            setNotifications((prev) => [
              {
                id: Date.now(),
                text: `Dokumen baru '${mockFileName}' berhasil di-unggah untuk ${selectedShipment.id}`,
                unread: true,
              },
              ...prev,
            ]);
          }, 800);
        };

        const handleCreateShipment = (e) => {
          e.preventDefault();
          if (!newPo || !newCommodity) return;

          const newId = `IMP-2026-80${shipments.length + 1}`;
          const newRecord = {
            id: newId,
            poNumber: newPo,
            commodity: newCommodity,
            origin: newOrigin,
            destination: "Astra Karawang Plant, West Java",
            status:
              newLane === "Green"
                ? "Released & Out of Gate (SPPB)"
                : newLane === "Yellow"
                  ? "Customs Assessment (Yellow Lane)"
                  : "Physical Inspection Pending (SPJM)",
            lane: newLane,
            estimatedTime:
              newLane === "Green"
                ? "Completed"
                : newLane === "Yellow"
                  ? "2 Days"
                  : "5 Days",
            lastUpdated: new Date()
              .toISOString()
              .replace("T", " ")
              .substring(0, 16),
            currentStep: newLane === "Green" ? 4 : 3,
            invoiceValue: parseFloat(newVal) || 120000,
            dutyRate: newLane === "Green" ? 0 : 10,
            ppnRate: 11,
            pphRate: 2.5,
            sdppiCert:
              "SNI-" +
              Math.floor(10000 + Math.random() * 90000) +
              "/ASTRA/2026",
            lartasStatus:
              newLane === "Green" ? "Compliant" : "Regulatory Review Required",
            documents: [
              {
                name: "Generated_Invoice_" + newId + ".pdf",
                type: "Invoice",
                status: "Approved",
                size: "1.5 MB",
                uploader: "Supply Team",
              },
              {

1. **Laporan Surveyor (LS):** Wajib diperoleh di pelabuhan muat negara asal (Jepang/Thailand) sebelum pengapalan dilakukan.
2. **Pencocokan Portal INSW:** Pastikan ID Sertifikat SNI Astra terdaftar dan berstatus aktif di Portal Indonesia Single Window (INSW).

                          <div className="p-3 bg-rose-50 rounded-xl text-rose-600 border border-rose-100">
                            <svg
                              className="w-5 h-5"
                              fill="none"
                              stroke="currentColor"
                              viewBox="0 0 24 24"
                            >
                              <path
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                strokeWidth="2"
                                d="M20.618 5.984A11.955 11.955 0 0112 2.944a11.952 11.952 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016zM12 9v2m0 4h.01"
                              ></path>
                            </svg>
                          </div>
                        </div>
                        <div className="mt-4 text-[11px] text-rose-600 font-bold">
                          Physical Inspections: SPJM Assigned
                        </div>
                      </div>
                    </div>

                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-100 pb-5">
                          <div>
                            <div className="flex items-center gap-3">
                              <span className="text-sm font-black text-blue-600 tracking-widest font-mono text-xs">
                                {selectedShipment.id}
                              </span>
                              <span
                                className={`text-[10px] px-2.5 py-0.5 rounded-full font-extrabold uppercase tracking-wide border ${
                                  selectedShipment.lane === "Green"
                                    ? "bg-emerald-50 text-emerald-700 border-emerald-200"
                                    : selectedShipment.lane === "Yellow"
                                      ? "bg-amber-50 text-amber-700 border-amber-200"
                                      : "bg-rose-50 text-rose-700 border-rose-200"

                              >
                                {selectedShipment.lane} Lane Process
                              </span>
                            </div>
                            <h4 className="text-base font-bold text-slate-900 mt-1">
                              {selectedShipment.commodity}
                            </h4>
                            <p className="text-xs text-slate-500 font-medium">
                              PO Ref: {selectedShipment.poNumber} | Origin:{" "}
                              {selectedShipment.origin}
                            </p>
                          </div>

                          <div className="flex gap-2">

                              onClick={() => setShowPrintModal(true)}

                              <i className="fa-solid fa-print"></i> Print PIB

                            </button>
                            <button
                              onClick={runAiComplianceAudit}
                              disabled={isAuditLoading}
                              className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white text-xs font-bold px-3 py-2 rounded-xl transition-all flex items-center gap-1.5 shadow-md shadow-blue-500/10"
                            >
                              {isAuditLoading ? (
                                <span className="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                              ) : (
                                <svg
                                  className="w-3.5 h-3.5"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2.5"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.952 11.952 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                                  ></path>
                                </svg>
                              )}
                              Audit Compliance AI
                            </button>
                          </div>
                        </div>

                        {/* HIGH-LEVEL INTERACTIVE STEPPER PROGRESSION */}
                        <div className="relative flex flex-col md:flex-row justify-between gap-6 py-2">
                          {stepsList.map((step, idx) => {
                            const isDone = idx < selectedShipment.currentStep;
                            const isCurrent =
                              idx === selectedShipment.currentStep;
                            return (
                              <div
                                key={idx}
                                className="flex-1 flex md:flex-col items-start md:items-center text-left md:text-center relative"
                              >
                                {/* Stepper Connector Bar */}
                                {idx < stepsList.length - 1 && (
                                  <div
                                    className={`hidden md:block absolute top-5 left-[55%] w-full h-0.5 ${
                                      idx < selectedShipment.currentStep
                                        ? "bg-blue-600"
                                        : "bg-slate-200"
                                    }`}
                                  />
                                )}

                                {/* Node Icon */}
                                <div
                                  className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xs shrink-0 transition-all ${
                                    isDone
                                      ? "bg-blue-600 text-white shadow-md shadow-blue-500/10"
                                      : isCurrent
                                        ? "bg-white text-blue-600 border-2 border-blue-600 shadow-md"
                                        : "bg-slate-100 text-slate-400 border border-slate-200"
                                  }`}
                                >
                                  {isDone ? (
                                    <svg
                                      className="w-5 h-5"
                                      fill="none"
                                      stroke="currentColor"
                                      viewBox="0 0 24 24"
                                    >
                                      <path
                                        strokeLinecap="round"
                                        strokeLinejoin="round"
                                        strokeWidth="2.5"
                                        d="M5 13l4 4L19 7"
                                      ></path>
                                    </svg>
                                  ) : (
                                    idx + 1
                                  )}
                                </div>

                                {/* Captions */}
                                <div className="ml-3 md:ml-0 md:mt-3">
                                  <p
                                    className={`text-xs font-bold tracking-tight ${isCurrent ? "text-blue-600" : "text-slate-700"}`}
                                  >
                                    {step.label}
                                  </p>
                                  <p className="text-[10px] text-slate-500 mt-0.5 max-w-[120px] hidden md:block leading-snug">
                                    {step.desc}
                                  </p>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        {/* INTERACTIVE COMPLIANCE REPORT PANEL */}
                        {complianceReport && (
                          <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5 space-y-3 shadow-inner">
                            <div className="flex justify-between items-center">
                              <h5 className="text-xs font-bold text-blue-700 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                                Gemini Compliance Audit Report Card
                              </h5>
                              <button
                                onClick={() => setComplianceReport(null)}
                                className="text-slate-500 hover:text-slate-700 text-xs font-bold"
                              >
                                Close report
                              </button>
                            </div>
                            <div className="text-xs text-slate-800 whitespace-pre-wrap leading-relaxed prose font-mono max-h-[250px] overflow-y-auto bg-white p-4 rounded-xl border border-blue-100 shadow-sm">
                              {complianceReport}
                            </div>
                          </div>
                        )}

                        {/* CONTEXTUAL ERROR & WARNINGS CARDS */}
                        <div className="p-5 rounded-2xl border bg-slate-50 border-slate-200">
                          {selectedShipment.lane === "Green" && (
                            <div className="flex gap-4">
                              <div className="text-emerald-600 shrink-0 bg-emerald-100 p-2.5 rounded-xl h-fit border border-emerald-200">
                                <svg
                                  className="w-6 h-6"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2"
                                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                                  ></path>
                                </svg>
                              </div>
                              <div>
                                <h4 className="text-sm font-bold text-emerald-700">
                                  Persetujuan Pengeluaran Barang (SPPB) Terbit
                                </h4>
                                <p className="text-xs text-slate-600 mt-1 leading-relaxed">
                                  Analisis resiko Bea Cukai menyatakan seluruh
                                  kelayakan Lartas & Klasifikasi HS Code clear.
                                  Cargo diperbolehkan melintasi gerbang TPS
                                  pelabuhan menuju gudang Astra.
                                </p>
                                <div className="mt-3 flex gap-2">
                                  <span className="text-[10px] bg-emerald-100 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded-md font-bold">
                                    Doc No: SPPB-90112/BC/2026
                                  </span>
                                  <span className="text-[10px] bg-white border border-slate-200 text-slate-500 px-2 py-0.5 rounded-md font-mono">
                                    Gate Out: Verified
                                  </span>
                                </div>
                              </div>
                            </div>
                          )}

                          {selectedShipment.lane === "Yellow" && (
                            <div className="flex gap-4">
                              <div className="text-amber-700 shrink-0 bg-amber-100 p-2.5 rounded-xl h-fit border border-amber-200">
                                <svg
                                  className="w-6 h-6"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2"
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                                  ></path>
                                </svg>
                              </div>
                              <div className="space-y-3 flex-1">
                                <div>
                                  <h4 className="text-sm font-bold text-amber-700">
                                    Nota Permintaan Dokumen (NPD) Terbit
                                  </h4>
                                  <p className="text-xs text-slate-600 mt-1 leading-relaxed">
                                    Petugas pemeriksa membutuhkan dokumen
                                    spesifikasi teknis tambahan / Laporan
                                    Surveyor untuk memvalidasi suku cadang
                                    manufaktur otomotif ini.
                                  </p>
                                </div>
                                <div className="bg-white border border-slate-200 p-3 rounded-xl text-xs font-mono shadow-inner text-slate-800">
                                  <span className="font-bold text-amber-600">
                                    Alasan Penahanan CEISA:
                                  </span>{" "}
                                  {selectedShipment.npdNotes}
                                </div>
                                <div className="flex gap-2">
                                  <button
                                    onClick={() =>
                                      setActiveTab("DocumentVault")
                                    }
                                    className="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded-xl text-xs font-bold transition-all shadow-sm"
                                  >
                                    Upload Dokumen LS
                                  </button>
                                  <button
                                    onClick={() => {
                                      setChatInput(
                                        "Bagaimana cara membuktikan kecocokan Laporan Surveyor pada suku cadang otomotif?",

                                      setActiveTab("AIAdvisor");
                                    }}
                                    className="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all shadow-sm"
                                  >
                                    Tanya AI Caranya
                                  </button>
                                </div>
                              </div>
                            </div>
                          )}

                          {selectedShipment.lane === "Red" && (
                            <div className="flex gap-4">
                              <div className="text-rose-700 shrink-0 bg-rose-100 p-2.5 rounded-xl h-fit border border-rose-200">
                                <svg
                                  className="w-6 h-6"
                                  fill="none"
                                  stroke="currentColor"
                                  viewBox="0 0 24 24"
                                >
                                  <path
                                    strokeLinecap="round"
                                    strokeLinejoin="round"
                                    strokeWidth="2"
                                    d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
                                  ></path>
                                </svg>
                              </div>
                              <div className="space-y-3 flex-1">
                                <div>
                                  <h4 className="text-sm font-bold text-rose-700">
                                    Jalur Merah - Pemeriksaan Fisik Terbit

                                  <p className="text-xs text-slate-600 mt-1 leading-relaxed">
                                    Sistem CEISA menginstruksikan pemeriksaan
                                    fisik kargo kontainer 100%. Broker/LSP wajib
                                    mendampingi pembongkaran segel kontainer
                                    bersama petugas Bea Cukai di lapangan
                                    penimbunan TPS.
                                  </p>
                                </div>
                                <div className="bg-white border border-slate-200 p-3 rounded-xl text-xs font-mono shadow-inner text-slate-800">
                                  <span className="font-bold text-rose-600">
                                    Pemberitahuan SPJM:
                                  </span>{" "}
                                  {selectedShipment.spjmNotes}
                                </div>

                                {/* NEW INTERACTIVE RESCHEDULER FOR RED LANE */}
                                <div className="bg-slate-100 p-4 rounded-xl space-y-2 border border-slate-200">
                                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">
                                    Reschedule Behandling / Inspection
                                  </span>
                                  <div className="flex flex-wrap gap-2">
                                    <input
                                      type="date"
                                      value={customInspectionDate}
                                      onChange={(e) =>
                                        setCustomInspectionDate(e.target.value)
                                      }
                                      className="bg-white border border-slate-200 text-xs px-2 py-1.5 rounded-lg text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500"
                                    />
                                    <input
                                      type="time"
                                      value={customInspectionTime}
                                      onChange={(e) =>
                                        setCustomInspectionTime(e.target.value)
                                      }

                                    />
                                    <button
                                      onClick={() => {
                                        addTerminalLog(
                                          `Behandling rescheduled for ${selectedShipment.id} to ${customInspectionDate} ${customInspectionTime}`,
                                        );
                                        simulateLaneChange("Red");
                                      }}
                                      className="bg-rose-600 hover:bg-rose-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all shadow-sm"
                                    >
                                      Apply Schedule
                                    </button>
                                  </div>
                                </div>

                                <div className="flex gap-2">
                                  <button className="bg-rose-600 hover:bg-rose-700 text-white px-3 py-1.5 rounded-xl text-xs font-bold transition-all shadow-sm">
                                    Koordinasikan Dengan Lapangan
                                  </button>
                                </div>
                              </div>
                            </div>
                          )}
                        </div>

                        {/* LANE ALTERATION CONTROLS (ONLY FOR SUPPLY OR BROKER ROLE) */}
                        {(activeRole === "Supply Team" ||
                          activeRole === "Custom Broker/LSP") && (
                          <div className="border border-dashed border-slate-300 rounded-2xl p-5 space-y-4">
                            <div>
                              <h4 className="text-xs font-bold tracking-widest text-slate-400 uppercase">
                                Lane Alteration Sandbox
                              </h4>
                              <p className="text-[11px] text-slate-500 mt-1">
                                Ubah jalur status di bawah untuk menyimulasikan
                                integrasi Bea Cukai (CEISA) secara visual.
                              </p>
                            </div>
                            <div className="flex flex-wrap gap-2">
                              <button
                                onClick={() => simulateLaneChange("Green")}
                                className="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5"
                              >
                                🟢 Force Green Lane
                              </button>
                              <button
                                onClick={() => simulateLaneChange("Yellow")}
                                className="bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5"
                              >
                                🟡 Force Yellow Lane
                              </button>
                              <button
                                onClick={() => simulateLaneChange("Red")}
                                className="bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-1.5"
                              >
                                🔴 Force Red Lane
                              </button>
                            </div>
                          </div>
                        )}
                      </div>

                      {/* SHIPMENT SIDEBAR SELECTOR (COL-4) */}
                      <div className="lg:col-span-4 flex flex-col gap-6">
                        {/* SEARCH & QUICK SWITCH */}
                        <div className="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col h-[350px] shadow-sm">
                          <div className="mb-3">
                            <h4 className="text-xs font-bold text-slate-700 tracking-wider uppercase">
                              Active Shipments Vault
                            </h4>
                            <p className="text-[11px] text-slate-500 mt-0.5">
                              Pilih untuk melacak & mengedit deklarasi impor
                            </p>
                          </div>

                          <div className="space-y-2 overflow-y-auto flex-1 pr-1">
                            {shipments.map((s) => {
                              const isChosen = selectedShipment.id === s.id;
                              return (
                                <div
                                  key={s.id}
                                  onClick={() => handleSelectShipment(s.id)}
                                  className={`p-3.5 rounded-xl border cursor-pointer transition-all ${
                                    isChosen
                                      ? "bg-blue-50 border-blue-500 shadow-sm ring-1 ring-blue-500/10"
                                      : "bg-white border-slate-200 hover:bg-slate-50"
                                  }`}
                                >
                                  <div className="flex justify-between items-center">
                                    <span className="text-[11px] font-black text-blue-600 tracking-wider font-mono text-xs">
                                      {s.id}
                                    </span>
                                    <span
                                      className={`text-[9px] px-2 py-0.5 rounded-full font-bold uppercase ${
                                        s.lane === "Green"
                                          ? "bg-emerald-100 text-emerald-700"
                                          : s.lane === "Yellow"
                                            ? "bg-amber-100 text-amber-700"
                                            : "bg-rose-100 text-rose-700"
                                      }`}
                                    >
                                      {s.lane} Lane
                                    </span>
                                  </div>
                                  <h5 className="text-xs font-bold text-slate-900 mt-1.5 truncate">
                                    {s.commodity}
                                  </h5>
                                  <div className="flex justify-between items-center text-[10px] text-slate-500 mt-2 border-t border-slate-100 pt-1.5">
                                    <span className="font-medium">
                                      Value: ${s.invoiceValue.toLocaleString()}
                                    </span>
                                    <span className="font-medium">
                                      ETA: {s.estimatedTime}
                                    </span>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>

                        {/* REAL-TIME CEISA TERMINAL STREAM */}
                        <div className="bg-slate-950 text-emerald-400 border border-slate-800 rounded-2xl p-5 flex flex-col h-[260px] font-mono shadow-lg">
                          <div className="flex justify-between items-center mb-2 border-b border-slate-850 pb-2">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                              <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                              CEISA Terminal Command console
                            </span>
                            <button
                              onClick={() => setTerminalLogs([])}
                              className="text-[9px] text-slate-500 hover:text-slate-300"
                            >
                              Clear
                            </button>
                          </div>

                          <div
                            ref={terminalContainerRef}
                            className="flex-1 overflow-y-auto text-[10px] space-y-1.5 pr-1 mb-2 leading-normal selection:bg-emerald-950"
                          >
                            {terminalLogs.map((log, index) => (
                              <div key={index}>{log}</div>
                            ))}
                          </div>

                          <form
                            onSubmit={handleTerminalSubmit}
                            className="flex gap-2"
                          >
                            <span className="text-emerald-500 text-xs self-center font-bold">
                              $
                            </span>
                            <input
                              type="text"
                              placeholder="Type /help or command..."
                              value={terminalInput}
                              onChange={(e) => setTerminalInput(e.target.value)}
                              className="flex-1 bg-slate-900 border border-slate-800 text-[11px] px-2 py-1.5 text-emerald-400 focus:outline-none focus:border-emerald-600 rounded-lg"
                            />
                          </form>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* TAB 2: ACTIVE DECLARATIONS / SHIPMENTS */}
                {activeTab === "Shipments" && (
                  <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                    {/* WORKABLE SEARCH & LANE FILTER CONTROLS */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-5 mb-6">
                      <div>
                        <h3 className="text-lg font-black text-slate-900">
                          PIB Declarations List
                        </h3>
                        <p className="text-xs text-slate-500">
                          Pemberitahuan Impor Barang data bank for Indonesia
                          customs logs.
                        </p>
                      </div>

                      <div className="flex flex-wrap items-center gap-3">
                        {/* Search input field */}
                        <input
                          type="text"
                          placeholder="Search Commodity/PO..."
                          value={shipmentsSearch}
                          onChange={(e) => setShipmentsSearch(e.target.value)}
                          className="bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500 font-mono w-48 shadow-sm"
                        />

                        {/* Working lane filter buttons */}
                        <div className="flex items-center gap-1.5 bg-slate-100 p-1 border border-slate-200 rounded-xl">
                          <span className="text-[10px] text-slate-500 px-2 font-bold uppercase">
                            Filter:
                          </span>
                          {["All", "Green", "Yellow", "Red"].map((laneVal) => (
                            <button
                              key={laneVal}
                              onClick={() => setShipmentsFilter(laneVal)}
                              className={`text-[10px] px-2.5 py-1.5 rounded-lg font-bold transition-all ${
                                shipmentsFilter === laneVal
                                  ? "bg-white text-blue-600 shadow-sm"
                                  : "text-slate-500 hover:text-slate-900"
                              }`}
                            >
                              {laneVal}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* HIGH-FIDELITY RESPONSIVE TABLE */}
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="border-b border-slate-200 text-slate-400 text-xs font-bold uppercase tracking-wider">
                            <th className="py-4 px-4">Transaction / PO</th>
                            <th className="py-4 px-4">Commodity / HS Code</th>
                            <th className="py-4 px-4">U.S. Dollar Value</th>
                            <th className="py-4 px-4">Tax Calculated</th>
                            <th className="py-4 px-4">SNI / Permit Status</th>
                            <th className="py-4 px-4">Customs Status</th>
                            <th className="py-4 px-4 text-right">Actions</th>
                          </tr>
                        </thead>

                      className="text-slate-400 hover:text-slate-900 transition-all"
                    >
                      <i className="fa-solid fa-xmark text-lg"></i>
                    </button>
                  </div>

                  <form
                    onSubmit={handleCreateShipment}
                    className="p-6 space-y-4"
                  >
                    <div>
                      <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                        Nomor PO (Purchase Order)
                      </label>
                      <input
                        type="text"
                        required
                        placeholder="Contoh: PO-ASTRA-7789"
                        value={newPo}
                        onChange={(e) => setNewPo(e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500 font-mono"
                      />
                    </div>

                    <div>
                      <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                        Nama Suku Cadang / Komoditas
                      </label>
                      <input
                        type="text"
                        required
                        placeholder="Contoh: Cylinders, Gearbox, CKD parts"
                        value={newCommodity}
                        onChange={(e) => setNewCommodity(e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500"
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                          Invoice Value (USD)
                        </label>
                        <input
                          type="number"
                          required
                          placeholder="Value in USD"
                          value={newVal}
                          onChange={(e) => setNewVal(e.target.value)}
                          className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500"
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                          Negara Asal (Origin)
                        </label>
                        <select
                          value={newOrigin}
                          onChange={(e) => setNewOrigin(e.target.value)}
                          className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500"
                        >
                          <option value="Japan (Toyota Motomachi Plant)">
                            Japan
                          </option>
                          <option value="Thailand (Toyota Samrong Plant)">
                            Thailand
                          </option>
                          <option value="Germany">Germany</option>
                          <option value="USA">USA</option>
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                        Simulasi Jalur Awal
                      </label>
                      <select
                        value={newLane}
                        onChange={(e) => setNewLane(e.target.value)}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold text-slate-900 focus:outline-none focus:ring-1 focus:ring-blue-500"
                      >
                        <option value="Green">
                          Green Lane (Auto-Approved SPPB)
                        </option>
                        <option value="Yellow">
                          Yellow Lane (Awaiting Lartas Verification)
                        </option>
                        <option value="Red">
                          Red Lane (Physical Inspection SPJM)
                        </option>
                      </select>
                    </div>

                    <div className="pt-4 border-t border-slate-100 flex justify-end gap-2.5">
                      <button
                        type="button"
                        onClick={() => setIsModalOpen(false)}
                        className="bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-sm"
                      >
                        Batal
                      </button>
                      <button
                        type="submit"
                        className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-xs font-bold transition-all shadow-sm"
                      >
                        Simpan Transaksi Impor
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            )}

            {/* MOCK PRINT / EXPORT MODAL DISPLAY */}
            {showPrintModal && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-white text-slate-900 border border-slate-200 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl p-8 space-y-6">
                  <div className="flex justify-between items-start border-b border-slate-100 pb-4">
                    <div>
                      <h3 className="font-extrabold text-xl text-slate-900">
                        PEMBERITAHUAN IMPOR BARANG (PIB)
                      </h3>
                      <span className="text-xs text-slate-500 font-mono">
                        AST-PIB-DRAFT-{selectedShipment.id}
                      </span>
                    </div>
                    <button
                      onClick={() => setShowPrintModal(false)}
                      className="text-slate-400 hover:text-slate-950 transition-all font-bold text-lg"
                    >
                      ✕
                    </button>
                  </div>

                  <div className="grid grid-cols-2 gap-4 text-xs">
                    <div>
                      <span className="text-slate-400 font-bold uppercase text-[9px] block">
                        Importir
                      </span>
                      <strong className="text-slate-800 text-sm">
                        PT. Astra International Tbk
                      </strong>
                      <span className="text-slate-500 block font-medium">
                        Suryapranoto, JKT Indonesia
                      </span>
                    </div>
                    <div>
                      <span className="text-slate-400 font-bold uppercase text-[9px] block">
                        Pemasok (Supplier)
                      </span>
                      <strong className="text-slate-800 text-sm">
                        {selectedShipment.origin}
                      </strong>
                    </div>
                  </div>

                  <hr className="border-slate-100" />

                  <div className="space-y-2 text-xs">
                    <div className="flex justify-between">
                      <span className="text-slate-500 font-medium">
                        Komoditas:
                      </span>
                      <strong className="text-slate-800">
                        {selectedShipment.commodity}
                      </strong>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500 font-medium">
                        Nilai Transaksi (FOB):
                      </span>
                      <strong className="text-slate-800">
                        ${selectedShipment.invoiceValue.toLocaleString()} USD
                      </strong>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500 font-medium">
                        Klasifikasi HS Code:
                      </span>
                      <strong className="text-slate-800 font-mono text-blue-600">
                        {selectedShipment.pibData.hsCode}
                      </strong>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-500 font-medium">
                        Jalur Pemeriksaan:
                      </span>
                      <strong
                        className={`font-mono ${selectedShipment.lane === "Green" ? "text-emerald-600" : selectedShipment.lane === "Yellow" ? "text-amber-500" : "text-red-500"}`}
                      >
                        {selectedShipment.lane} Lane
                      </strong>
                    </div>
                  </div>

                  <div className="bg-slate-50 p-4 rounded-xl space-y-2 text-xs border border-slate-200">
                    <span className="font-bold text-slate-700 block">
                      Kalkulasi Pajak Impor Terkait (PDRI):
                    </span>
                    <div className="flex justify-between">
                      <span className="text-slate-500 font-medium">
                        Total Bea Masuk & Pajak:
                      </span>
                      <strong className="text-slate-900 text-base font-mono">
                        Rp{" "}
                        {Math.round(
                          selectedShipment.pibData.taxCalculated,
                        ).toLocaleString("id-ID")}
                      </strong>
                    </div>
                  </div>

                  <div className="flex justify-end gap-2 text-xs pt-4 border-t border-slate-100">
                    <button
                      onClick={() => {
                        window.print();
                      }}
                      className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-500/10"
                    >
                      Print PIB Document
                    </button>
                    <button
                      onClick={() => setShowPrintModal(false)}
                      className="bg-slate-100 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-slate-200 transition-all shadow-sm"
                    >
                      Tutup
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* FOOTER METRICS */}
            <footer className="bg-white border-t border-slate-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs text-slate-400 mt-auto">
              <p className="font-medium">
                © 2026 PT Astra International Tbk - Logistics & Global Trade
                Division.
              </p>
              <p className="text-[10px] font-semibold">
                INSW Sandbox Connected | CEISA EDI Gateway Active
              </p>
            </footer>
          </div>
        );
      }

      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
